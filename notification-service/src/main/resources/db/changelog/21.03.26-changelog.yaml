databaseChangeLog:
- changeSet:
    id: 20260321-create-user-telegram-table
    author: hordiienko
    changes:
      - createTable:
          tableName: user_telegram
          columns:
            - column:
                name: id
                type: BIGINT
                autoIncrement: true
                constraints:
                  primaryKey: true
                  nullable: false
            - column:
                name: user_id
                type: BIGINT
                constraints:
                  nullable: false
                  unique: true
            - column:
                name: chat_id
                type: BIGINT
                constraints:
                  nullable: false
            - column:
                name: created_at
                type: DATETIME
                constraints:
                  nullable: false