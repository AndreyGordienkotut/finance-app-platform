databaseChangeLog:
  - changeSet:
      id: 20260316-1-create-notification-table
      author: hordiienko
      changes:
        - createTable:
            tableName: notification
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: channel
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: recipient
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: subject
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: message
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: transaction_id
                  type: BIGINT
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: sent_at
                  type: DATETIME
                  constraints:
                    nullable: true
              - column:
                  name: error_message
                  type: TEXT
                  constraints:
                    nullable: true